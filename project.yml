name: BrowSync
options:
  bundleIdPrefix: com.ct106
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  Aptabase:
    url: https://github.com/aptabase/aptabase-swift
    from: 0.3.0

settings:
  SWIFT_VERSION: "5.10"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  ENABLE_HARDENED_RUNTIME: YES
  SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

targets:

  # ─── Main App ───────────────────────────────────────────────────────────────

  BrowSync:
    type: application
    platform: macOS
    deploymentTarget: "14.0"

    info:
      path: BrowSync/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "7"
        CFBundleURLTypes:
          - CFBundleURLName: com.ct106.browsync
            CFBundleURLSchemes:
              - browsync
              - http
              - https
        CFBundleDocumentTypes:
          - CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.html
              - public.url
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        SUFeedURL: https://browsync.ct106.com/appcast.xml
        SUPublicEDKey: T9d+4vUpmrkAXNcwSOu7/MzSO6tIKr8JbVhYe4j0jaE=
        SUEnableAutomaticChecks: true
        LSUIElement: true

    sources:
      - path: BrowSync
        excludes:
          - "Resources/Info.plist"
          - "Resources/Design"

    resources:
      - path: BrowSync/Resources
        excludes:
          - "Info.plist"
          - "Design"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync
        PRODUCT_NAME: BrowSync
        INFOPLIST_FILE: BrowSync/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrowSync.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    dependencies:
      - target: BrowSyncExtension
      - package: Sparkle
      - package: Aptabase

  # ─── Safari Web Extension ────────────────────────────────────────────────────

  BrowSyncExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"

    info:
      path: BrowSyncExtension/Info.plist
      properties:
        CFBundleIdentifier: com.ct106.browsync.extension
        CFBundleName: BrowSyncExtension
        CFBundleDisplayName: BrowSync Extension
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "7"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
        NSHumanReadableCopyright: "© 2026 BrowSync"
        LSMinimumSystemVersion: "14.0"

    sources:
      - BrowSyncExtension/SafariWebExtensionHandler.swift
      - BrowSyncExtension/Resources/manifest.json
      - BrowSyncExtension/Resources/background.js
      - BrowSyncExtension/Resources/content.js
      - BrowSyncExtension/Resources/popup.html
      - BrowSyncExtension/Resources/popup.js
      - path: BrowSyncExtension/Resources/icons
        type: folder
      - path: BrowSyncExtension/Resources/_locales
        type: folder


    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync.extension
        CODE_SIGN_ENTITLEMENTS: BrowSyncExtension.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES

schemes:
  BrowSync:
    build:
      targets:
        BrowSync: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
    analyze:
      config: Debug
