name: BrowSync
options:
  bundleIdPrefix: com.ct106
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  Aptabase:
    url: https://github.com/aptabase/aptabase-swift
    from: 0.3.0

settings:
  SWIFT_VERSION: "5.10"
  MACOSX_DEPLOYMENT_TARGET: "13.0"
  ENABLE_HARDENED_RUNTIME: YES
  SWIFT_STRICT_CONCURRENCY: minimal

configs:
  Debug: debug
  Release: release

targets:

  # ─── Main App ───────────────────────────────────────────────────────────────

  BrowSync:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    info:
      path: BrowSync/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "1.1.5"
        CFBundleVersion: "28"
        CFBundleURLTypes:
          - CFBundleURLName: com.ct106.browsync
            CFBundleURLSchemes:
              - browsync
              - http
              - https
        CFBundleDocumentTypes:
          - CFBundleTypeName: Web Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.html
              - public.url
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        LSApplicationCategoryType: public.app-category.utilities
        SUFeedURL: https://browsync.ct106.com/appcast.xml
        SUPublicEDKey: T9d+4vUpmrkAXNcwSOu7/MzSO6tIKr8JbVhYe4j0jaE=
        SUEnableAutomaticChecks: true
        LSUIElement: true

    sources:
      - path: BrowSync
        excludes:
          - "Resources/Info.plist"
          - "Resources/InfoAppStore.plist"
          - "Resources/Design"

    resources:
      - path: BrowSync/Resources
        excludes:
          - "Info.plist"
          - "InfoAppStore.plist"
          - "Design"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync
        PRODUCT_NAME: BrowSync
        INFOPLIST_FILE: BrowSync/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrowSync.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

    dependencies:
      - target: SafariExtension
      - package: Sparkle
      - package: Aptabase

  # ─── Mac App Store App ──────────────────────────────────────────────────────

  BrowSyncAppStore:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    info:
      path: BrowSync/Resources/InfoAppStore.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.ct106.browsync
            CFBundleURLSchemes:
              - browsync
              - http
              - https
        CFBundleDocumentTypes:
          - CFBundleTypeName: Web Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.html
              - public.url
        NSUserActivityTypes:
          - NSUserActivityTypeBrowsingWeb
        LSApplicationCategoryType: public.app-category.utilities
        LSUIElement: true

    sources:
      - path: BrowSync
        excludes:
          - "Resources/Info.plist"
          - "Resources/InfoAppStore.plist"
          - "Resources/Design"

    resources:
      - path: BrowSync/Resources
        excludes:
          - "Info.plist"
          - "InfoAppStore.plist"
          - "Design"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync
        PRODUCT_NAME: BrowSync
        INFOPLIST_FILE: BrowSync/Resources/InfoAppStore.plist
        CODE_SIGN_ENTITLEMENTS: BrowSyncAppStore.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        APPLICATION_EXTENSION_API_ONLY: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_SWIFT_FLAGS: "$(inherited) -D APP_STORE"

    dependencies:
      - target: SafariExtensionAppStore
      - package: Aptabase

  # ─── Safari Web Extension ────────────────────────────────────────────────────

  SafariExtension:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"

    info:
      path: SafariExtension/Info.plist
      properties:
        CFBundleIdentifier: com.ct106.browsync.extension
        CFBundleName: SafariExtension
        CFBundleDisplayName: BrowSync Extension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
        NSHumanReadableCopyright: "© 2026 BrowSync"
        LSMinimumSystemVersion: "13.0"

    sources:
      - SafariExtension/SafariWebExtensionHandler.swift
      - SafariExtension/Resources/manifest.json
      - SafariExtension/Resources/background.js
      - SafariExtension/Resources/content.js
      - SafariExtension/Resources/popup.html
      - SafariExtension/Resources/popup.js
      - path: SafariExtension/Resources/icons
        type: folder
      - path: SafariExtension/Resources/_locales
        type: folder


    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync.extension
        CODE_SIGN_ENTITLEMENTS: SafariExtension.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES

  # ─── Mac App Store Safari Web Extension ─────────────────────────────────────

  SafariExtensionAppStore:
    type: app-extension
    platform: macOS
    deploymentTarget: "13.0"

    info:
      path: SafariExtension/InfoAppStore.plist
      properties:
        CFBundleIdentifier: com.ct106.browsync.extension
        CFBundleName: SafariExtension
        CFBundleDisplayName: BrowSync Extension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.Safari.web-extension
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).SafariWebExtensionHandler
        NSHumanReadableCopyright: "© 2026 BrowSync"
        LSMinimumSystemVersion: "13.0"

    sources:
      - SafariExtension/SafariWebExtensionHandler.swift
      - SafariExtension/Resources/manifest.json
      - SafariExtension/Resources/background.js
      - SafariExtension/Resources/content.js
      - SafariExtension/Resources/popup.html
      - SafariExtension/Resources/popup.js
      - path: SafariExtension/Resources/icons
        type: folder
      - path: SafariExtension/Resources/_locales
        type: folder

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ct106.browsync.extension
        CODE_SIGN_ENTITLEMENTS: SafariExtensionAppStore.entitlements
        DEVELOPMENT_TEAM: "U2NEAJ73J2"
        CODE_SIGN_STYLE: Automatic
        SWIFT_EMIT_LOC_STRINGS: YES
        OTHER_SWIFT_FLAGS: "$(inherited) -D APP_STORE"

schemes:
  BrowSync:
    build:
      targets:
        BrowSync: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
    analyze:
      config: Debug
  BrowSyncAppStore:
    build:
      targets:
        BrowSyncAppStore: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
    analyze:
      config: Debug
